<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web GIS Kawasan Industri - Fixed Geografis</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Batang Status Koordinat Dinamis */
        #coordinate-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font-size: 12px;
            color: #333;
            z-index: 1000;
            font-weight: bold;
            border: 1px solid #ccc;
        }

        /* ================= PANEL MANAJEMEN LAYER (FLOATING & DRAGGABLE) ================= */
        #layer-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 250px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.35);
            z-index: 1200;
            font-size: 13px;
            color: #333;
            user-select: none;
        }

        #layer-panel-header {
            background: #0078A8;
            color: white;
            padding: 8px 10px;
            border-radius: 8px 8px 0 0;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 0.3px;
        }

        #layer-panel-header .drag-hint {
            opacity: 0.85;
            font-size: 13px;
        }

        #layer-panel-toggle {
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #layer-panel-toggle:hover {
            background: rgba(255,255,255,0.35);
        }

        #layer-panel-body {
            padding: 12px;
        }

        #layer-panel-body.collapsed {
            display: none;
        }

        .panel-section-title {
            margin: 0 0 6px 0;
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            cursor: pointer;
        }

        .panel-row label {
            cursor: pointer;
        }

        .panel-divider {
            margin: 10px 0;
            border: none;
            border-top: 1px dashed #ccc;
        }

        /* Bagian Khusus Manajemen File SHP di dalam Panel Floating */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .btn {
            border: 1px solid #0078A8;
            color: white;
            background-color: #0078A8;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-align: center;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #file-info {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            line-height: 1.3;
        }

        /* ================= LABEL KUSTOM (LAYER TERPISAH) ================= */
        .custom-site-label {
            background: #ffff00 !important;
            color: #000000 !important;
            font-weight: bold !important;
            font-size: 10px !important;
            padding: 2px 6px !important;
            border: 1px solid #cc9900 !important;
            border-radius: 3px !important;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.4) !important;
            white-space: nowrap !important;
            width: auto !important;
            height: auto !important;
            display: inline-block !important;
            transform: translate(-50%, -50%);
            margin: 0 !important;
        }

        /* Desain Tombol Map di kiri atas (Reset & GPS) */
        .leaflet-custom-btn {
            background-color: white;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            cursor: pointer;
            color: #333;
            text-decoration: none;
        }
        .leaflet-custom-btn:hover {
            background-color: #f4f4f4;
        }

        /* Satuan default plugin leaflet-measure sudah meter/km, tinggal rapikan posisinya */
        .leaflet-control-measure {
            margin-top: 8px !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="coordinate-bar">
        Koordinat: <span id="latlng-val">Arahkan kursor ke peta...</span>
    </div>

    <!-- ================= PANEL MANAJEMEN LAYER (FLOATING & DRAGGABLE) ================= -->
    <div id="layer-panel">
        <div id="layer-panel-header">
            <span><span class="drag-hint">⠿</span>&nbsp; Manajemen Layer</span>
            <div id="layer-panel-toggle">▾</div>
        </div>
        <div id="layer-panel-body">
            <div class="panel-section-title">Basemap</div>
            <div class="panel-row">
                <input type="radio" name="basemap" id="basemap-hybrid" checked>
                <label for="basemap-hybrid">Google Hybrid</label>
            </div>
            <div class="panel-row">
                <input type="radio" name="basemap" id="basemap-satellite">
                <label for="basemap-satellite">Google Satellite</label>
            </div>
            <div class="panel-row">
                <input type="radio" name="basemap" id="basemap-osm">
                <label for="basemap-osm">OpenStreetMap</label>
            </div>

            <hr class="panel-divider">

            <div class="panel-section-title">Overlay</div>
            <div class="panel-row">
                <input type="checkbox" id="overlay-buildings" checked>
                <label for="overlay-buildings">Key Site Buildings</label>
            </div>
            <div class="panel-row">
                <input type="checkbox" id="overlay-labels" checked>
                <label for="overlay-labels">Label Nama Site</label>
            </div>
            <div class="panel-row">
                <input type="checkbox" id="overlay-shp" checked>
                <label for="overlay-shp">Layer SHP Tambahan</label>
            </div>

            <hr class="panel-divider">

            <div class="panel-section-title">Upload Eksternal</div>
            <div class="upload-btn-wrapper">
                <button class="btn">Pilih File .ZIP (SHP)</button>
                <input type="file" id="shp-file" accept=".zip" />
            </div>
            <div id="file-info">Kompresi .zip (berisi .shp, .shx, .dbf, .prj)</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shpjs/4.0.2/shp.min.js"></script>

    <script>
        // --- 1. DATA GEOJSON GEOGRAFIS ASLI (Langsung dari file Site Building IKK.geojson Anda) ---
        var geojsonData = {"type": "FeatureCollection", "name": "Key Site Building IKK", "crs": {"type": "name", "properties": {"name": "urn:ogc:def:crs:OGC:1.3:CRS84"}}, "features": [{"type": "Feature", "properties": {"id": null, "Nama": "Packaging Warehouse", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.32959136055089, -6.422619865942181], [107.33084469251875, -6.422619532149172], [107.33085289777507, -6.422848752941778], [107.3295888226074, -6.422849135862852], [107.32959136055089, -6.422619865942181]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "CMP Building", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.32648635916159, -6.423339678742218], [107.32705936707404, -6.423351401805104], [107.32703381444487, -6.424820206977864], [107.32650206665302, -6.424826207680951], [107.32648635916159, -6.423339678742218]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "PM1 Auto Warehouse Parking", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.32650941567731, -6.424867369207731], [107.32703042894337, -6.424863208395309], [107.32706091821927, -6.426055931641273], [107.32649510164413, -6.426051341288093], [107.32650941567731, -6.424867369207731]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "BU17 West Side Loading Dock", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.32876074726096, -6.428953329697013], [107.32888249876135, -6.428952775098389], [107.32889967909817, -6.430759898009331], [107.32878151626399, -6.430762227495629], [107.32876074726096, -6.428953329697013]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "Bu17 PM3 Soil", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.33070029958819, -6.431014978800257], [107.33131623678939, -6.431015751736954], [107.33133111118914, -6.431921969512286], [107.33070805999809, -6.431931975903644], [107.33070029958819, -6.431014978800257]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "Main Gate", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.34739444792696, -6.432482468354157], [107.34773461726687, -6.432477323382142], [107.34774115894281, -6.433122074084197], [107.34740453719097, -6.433120038682857], [107.34739444792696, -6.432482468354157]]]]}}, {"type": "Feature", "properties": {"id": null, "Nama": "Gas Storage & Waste Control", "Luas_m2": null, "Keterangan": null}, "geometry": {"type": "MultiPolygon", "coordinates": [[[[107.35054278147798, -6.425405159327753], [107.3510583902757, -6.425395625521897], [107.35109716043156, -6.426040226710868], [107.35056366320283, -6.426053425108393], [107.35054278147798, -6.425405159327753]]]]}}]};

        // --- 2. INISIALISASI MAP UTAMA ---
        var map = L.map('map', { zoomControl: true });

        // --- 3. BASEMAPS SETUP ---
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        var googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20 });
        var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });

        googleHybrid.addTo(map);

        // --- 4. LAYER POLIGON BANGUNAN (TANPA LABEL, HANYA POPUP) ---
        var keySiteLayer = L.geoJSON(geojsonData, {
            style: function(feature) {
                return {
                    color: "#e60000",
                    weight: 3,
                    dashArray: "6, 6",
                    opacity: 1,
                    fillColor: "#ff4d4d",
                    fillOpacity: 0.15
                };
            },
            onEachFeature: function(feature, layer) {
                if (feature.properties && feature.properties.Nama) {
                    var popupHtml = "<b>Detail Fasilitas:</b><br><hr>";
                    popupHtml += "Nama Objek: <b>" + feature.properties.Nama + "</b><br>";
                    layer.bindPopup(popupHtml);
                }
            }
        }).addTo(map);

        // --- 4b. LAYER LABEL NAMA SITE (TERPISAH, BISA ON/OFF SENDIRI) ---
        var labelLayer = L.layerGroup();
        geojsonData.features.forEach(function(feature) {
            if (feature.properties && feature.properties.Nama) {
                var tempLayer = L.geoJSON(feature);
                var center = tempLayer.getBounds().getCenter();
                var labelMarker = L.marker(center, {
                    icon: L.divIcon({
                        className: 'custom-site-label',
                        html: feature.properties.Nama,
                        iconSize: [0, 0]
                    }),
                    interactive: false,
                    keyboard: false
                });
                labelLayer.addLayer(labelMarker);
            }
        });
        labelLayer.addTo(map);

        // Otomatis fokus kamera langsung ke bounds data spasial Anda
        var originalBounds = keySiteLayer.getBounds();
        map.fitBounds(originalBounds);


        // --- 5. LAYER SHP TAMBAHAN (DARI UPLOAD) ---
        var uploadedLayers = L.layerGroup().addTo(map);


        // --- 5b. PANEL MANAJEMEN LAYER: TOGGLE BASEMAP & OVERLAY ---
        document.getElementById('basemap-hybrid').addEventListener('change', function() {
            map.removeLayer(osm); map.removeLayer(googleSatellite);
            googleHybrid.addTo(map);
        });
        document.getElementById('basemap-satellite').addEventListener('change', function() {
            map.removeLayer(osm); map.removeLayer(googleHybrid);
            googleSatellite.addTo(map);
        });
        document.getElementById('basemap-osm').addEventListener('change', function() {
            map.removeLayer(googleHybrid); map.removeLayer(googleSatellite);
            osm.addTo(map);
        });

        document.getElementById('overlay-buildings').addEventListener('change', function(e) {
            if (e.target.checked) { keySiteLayer.addTo(map); } else { map.removeLayer(keySiteLayer); }
        });
        document.getElementById('overlay-labels').addEventListener('change', function(e) {
            if (e.target.checked) { labelLayer.addTo(map); } else { map.removeLayer(labelLayer); }
        });
        document.getElementById('overlay-shp').addEventListener('change', function(e) {
            if (e.target.checked) { uploadedLayers.addTo(map); } else { map.removeLayer(uploadedLayers); }
        });


        // --- 5c. PANEL MANAJEMEN LAYER: COLLAPSE / EXPAND ---
        var panelToggle = document.getElementById('layer-panel-toggle');
        var panelBody = document.getElementById('layer-panel-body');
        panelToggle.addEventListener('click', function() {
            panelBody.classList.toggle('collapsed');
            panelToggle.innerHTML = panelBody.classList.contains('collapsed') ? '▸' : '▾';
        });


        // --- 5d. PANEL MANAJEMEN LAYER: DRAG & DROP BEBAS DI LAYAR ---
        (function makeDraggable() {
            var panel = document.getElementById('layer-panel');
            var header = document.getElementById('layer-panel-header');
            var offsetX = 0, offsetY = 0, isDragging = false;

            header.addEventListener('mousedown', function(e) {
                if (e.target === panelToggle) return;
                isDragging = true;
                var rect = panel.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                panel.style.right = 'auto';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var x = e.clientX - offsetX;
                var y = e.clientY - offsetY;
                x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
                y = Math.max(0, Math.min(window.innerHeight - 40, y));
                panel.style.left = x + 'px';
                panel.style.top = y + 'px';
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
                document.body.style.userSelect = '';
            });

            // Dukungan sentuhan (mobile/tablet)
            header.addEventListener('touchstart', function(e) {
                if (e.target === panelToggle) return;
                isDragging = true;
                var touch = e.touches[0];
                var rect = panel.getBoundingClientRect();
                offsetX = touch.clientX - rect.left;
                offsetY = touch.clientY - rect.top;
                panel.style.right = 'auto';
            }, { passive: true });

            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                var touch = e.touches[0];
                var x = touch.clientX - offsetX;
                var y = touch.clientY - offsetY;
                x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
                y = Math.max(0, Math.min(window.innerHeight - 40, y));
                panel.style.left = x + 'px';
                panel.style.top = y + 'px';
            }, { passive: true });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });
        })();


        // --- 6. TOMBOL RESET VIEW (🏠) DI KIRI ATAS ---
        L.Control.ResetView = L.Control.extend({
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                var button = L.DomUtil.create('a', 'leaflet-custom-btn', container);
                button.innerHTML = '🏠';
                button.title = 'Kembali ke View Utama';

                L.DomEvent.on(button, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    map.fitBounds(originalBounds); // Kamera langsung mengarah pas ke batas pabrik
                });
                return container;
            }
        });
        map.addControl(new L.Control.ResetView({ position: 'topleft' }));


        // --- 7. TOMBOL GEOLOCATE GPS (📍) DI KIRI ATAS ---
        L.Control.Geolocate = L.Control.extend({
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                var button = L.DomUtil.create('a', 'leaflet-custom-btn', container);
                button.innerHTML = '📍';
                button.title = 'Cari Lokasi Saya';

                L.DomEvent.on(button, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    map.locate({setView: true, maxZoom: 17});
                });
                return container;
            }
        });
        map.addControl(new L.Control.Geolocate({ position: 'topleft' }));

        map.on('locationfound', function(e) {
            var radius = e.accuracy;
            L.marker(e.latlng).addTo(map)
                .bindPopup("Anda berada dalam radius " + Math.round(radius) + " meter dari titik ini.").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        });

        map.on('locationerror', function(e) {
            alert("Gagal mendapatkan lokasi: " + e.message);
        });


        // --- 8. ALAT UKUR (MEASUREMENT) DALAM SATUAN METER / KM ---
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares',
            activeColor: '#ff6600',
            completedColor: '#0078A8'
        });
        measureControl.addTo(map);


        // --- 9. UPDATE KOORDINAT DINAMIS SAAT MOUSE BERGERAK ---
        map.on('mousemove', function(e) {
            document.getElementById('latlng-val').innerHTML =
                e.latlng.lat.toFixed(6) + ", " + e.latlng.lng.toFixed(6);
        });


        // --- 10. UPLOAD & PARSING FILE SHP (.zip) ---
        document.getElementById('shp-file').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            var fileInfoEl = document.getElementById('file-info');
            fileInfoEl.innerHTML = "Memproses: " + file.name + " ...";

            var reader = new FileReader();
            reader.onload = function(evt) {
                var arrayBuffer = evt.target.result;

                shp(arrayBuffer).then(function(geojson) {
                    var shpLayer = L.geoJSON(geojson, {
                        style: function() {
                            return {
                                color: "#0078A8",
                                weight: 2,
                                fillColor: "#33a1c9",
                                fillOpacity: 0.25
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            if (feature.properties) {
                                var props = feature.properties;
                                var popupHtml = "<b>Detail Fitur:</b><br><hr>";
                                for (var key in props) {
                                    popupHtml += key + ": " + props[key] + "<br>";
                                }
                                layer.bindPopup(popupHtml);
                            }
                        }
                    });

                    uploadedLayers.addLayer(shpLayer);
                    map.fitBounds(shpLayer.getBounds());

                    fileInfoEl.innerHTML = "Berhasil dimuat: " + file.name;
                }).catch(function(err) {
                    console.error(err);
                    fileInfoEl.innerHTML = "Gagal memuat file. Pastikan .zip berisi .shp, .shx, .dbf, .prj yang valid.";
                });
            };
            reader.readAsArrayBuffer(file);
        });

    </script>
</body>
</html>
